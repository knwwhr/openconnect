<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개서 작성 Tool-kit - InsideJob</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        /* 카드 컨테이너 스타일 - 취업경쟁력 계산기와 동일 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 24px;
            margin-bottom: 16px;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .header p {
            color: #64748b;
            font-size: 1rem;
        }

        .section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .section-title i {
            color: #3b82f6;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input::placeholder, textarea::placeholder {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* 버튼 스타일 - 취업경쟁력 계산기와 동일 */
        .btn {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: white;
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 8px 16px rgba(239, 68, 68, 0.3);
        }

        .experience-item {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
            background: #f9fafb;
        }

        .experience-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .experience-number {
            background: #3b82f6;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 1rem;
        }

        .remove-experience {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #ef4444;
            font-size: 1rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            min-width: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .remove-experience:hover {
            background: #fee2e2;
            border-color: #f87171;
        }

        .remove-cert {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #ef4444;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .remove-cert:hover {
            background: #fee2e2;
        }

        .strengths-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .strength-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .strength-item input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .strength-examples {
            margin-top: 1rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 10px;
        }

        .example-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .example-item select {
            width: 200px;
        }

        .save-section {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
        }

        .save-section h2 {
            margin-bottom: 1rem;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .save-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .save-buttons .btn {
            background: white;
            color: #3b82f6;
        }

        /* 푸터 스타일 - 취업경쟁력 계산기와 동일 */
        .footer {
            margin-top: 3rem;
            padding: 2rem 0;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .company-name {
            font-size: 0.9rem;
            color: #475569;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .powered-by {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }

        .rights {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .form-row {
                flex-direction: column;
            }
            
            .save-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .save-buttons .btn {
                width: 100%;
                max-width: 300px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
        }

        .char-counter {
            text-align: right;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 4px;
        }

        .char-counter.near-limit { color: #f59e0b; }
        .char-counter.at-limit { color: #ef4444; font-weight: 600; }

        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .autosave-indicator {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .autosave-indicator.show { opacity: 1; }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #e2e8f0;
            height: 6px;
            z-index: 1000;
        }

        .progress-fill {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .section-count {
            background: #3b82f6;
            color: white;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 고정 진행도 바 -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Header -->
        <div class="header">
            <img src="logo.png" alt="인사이드잡" style="width: 60px; height: 60px; margin: 0 auto 1rem auto; display: block;" />
            <h1>자기소개서 작성 툴킷</h1>
        </div>

        <!-- 1. 기본정보 -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-user"></i>
                1. 기본정보
            </h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="name">성명</label>
                    <input type="text" id="name" placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" placeholder="010-1234-5678">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="school">학교/전공/학년</label>
                    <input type="text" id="school" placeholder="○○대학교 경영학과 4학년">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="location">거주 지역</label>
                    <input type="text" id="location" placeholder="서울시 강남구">
                </div>
                <div class="form-group">
                    <label for="hopedDate">희망 취업 시점</label>
                    <input type="text" id="hopedDate" placeholder="2024년 하반기">
                </div>
            </div>
        </div>

        <!-- 2. 지원 목표 -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-bullseye"></i>
                2. 지원 목표 (타깃)
            </h2>
            <div class="form-group">
                <label for="industry">희망 산업/회사 (복수 가능)</label>
                <input type="text" id="industry" placeholder="이커머스/○○, 콘텐츠/△△">
            </div>
            <div class="form-group">
                <label for="position">희망 직무 및 우선순위</label>
                <input type="text" id="position" placeholder="마케팅 > CS > 영업">
            </div>
            <div class="form-group">
                <label for="motivation">지원 동기 한 문장 (≤200자)</label>
                <textarea id="motivation" placeholder="왜 이 산업/직무/회사인지" maxlength="200" oninput="updateCharCount(this, 200)"></textarea>
                <div class="char-counter" id="motivation-counter">0 / 200자</div>
            </div>
            <div class="form-group">
                <label for="workType">희망 근무 형태/조건</label>
                <input type="text" id="workType" placeholder="지역, 인턴/신입, 정규/계약, 급여 범위 등">
            </div>
        </div>

        <!-- 3. 경험 목록 -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-list"></i>
                3. 경험 목록
                <span class="section-count" id="experienceCount">0개</span>
            </h2>
            <div id="experienceContainer">
                <!-- 경험 항목들이 여기에 동적으로 추가됩니다 -->
            </div>
            <button type="button" class="btn" onclick="addExperience()">
                <i class="fas fa-plus"></i> 경험 추가
            </button>
        </div>

        <!-- 4. 역량·강점 체크 및 사례 -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-star"></i>
                4. 역량·강점 체크 및 사례
            </h2>
            <label>강점 체크 (최대 5개)</label>
            <div class="strengths-grid">
                <div class="strength-item">
                    <input type="checkbox" id="strength1" value="문제해결">
                    <label for="strength1">문제해결</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength2" value="협업/소통">
                    <label for="strength2">협업/소통</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength3" value="기획력">
                    <label for="strength3">기획력</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength4" value="분석력">
                    <label for="strength4">분석력</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength5" value="실행력">
                    <label for="strength5">실행력</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength6" value="책임감">
                    <label for="strength6">책임감</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength7" value="리더십">
                    <label for="strength7">리더십</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength8" value="성실성">
                    <label for="strength8">성실성</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength9" value="고객지향">
                    <label for="strength9">고객지향</label>
                </div>
                <div class="strength-item">
                    <input type="checkbox" id="strength10" value="배움/적응">
                    <label for="strength10">배움/적응</label>
                </div>
            </div>
            
            <div class="strength-examples">
                <label>강점별 한 줄 사례 (경험 번호 연결)</label>
                <div id="strengthExamples">
                    <!-- 선택된 강점에 대한 사례 입력 필드가 여기에 추가됩니다 -->
                </div>
            </div>
        </div>

        <!-- 5. 교육·자격·수상·어학 -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-certificate"></i>
                5. 교육·자격·수상·어학
            </h2>
            <div id="certificateContainer">
                <!-- 자격증/교육 항목들이 여기에 추가됩니다 -->
            </div>
            <button type="button" class="btn btn-secondary" onclick="addCertificate()">
                <i class="fas fa-plus"></i> 항목 추가
            </button>
        </div>

        <!-- 6. 포트폴리오·링크 -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-link"></i>
                6. 포트폴리오·링크
            </h2>
            <div class="form-group">
                <label for="linkedin">링크드인</label>
                <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourname">
            </div>
            <div class="form-group">
                <label for="portfolio">노션/개인 홈페이지</label>
                <input type="url" id="portfolio" placeholder="https://yourportfolio.com">
            </div>
            <div class="form-group">
                <label for="blog">블로그</label>
                <input type="url" id="blog" placeholder="https://yourblog.com">
            </div>
            <div class="form-group">
                <label for="presentation">발표자료/캠페인</label>
                <input type="url" id="presentation" placeholder="https://drive.google.com/...">
            </div>
            <div class="form-group">
                <label for="others">기타</label>
                <input type="url" id="others" placeholder="기타 링크">
            </div>
        </div>

        <!-- 저장 및 내보내기 -->
        <div class="save-section">
            <h2><i class="fas fa-save"></i> 완성된 정보 저장하기</h2>
            <div class="save-buttons">
                <button type="button" class="btn" onclick="exportToHTML()" style="justify-content: center;">
                    <i class="fas fa-download"></i> 파일(html)로 저장하기
                </button>
            </div>
            <div class="save-buttons" style="margin-top: 1rem;">
                <button type="button" class="btn" onclick="window.open('https://insidejob.kr', '_blank')" style="background: #10b981; color: white; border: 2px solid #10b981; justify-content: center;">
                    <i class="fas fa-user-tie"></i> 맞춤형 취업컨설팅 받아보기
                </button>
            </div>
        </div>
    </div>

    <script>
        let experienceCount = 0;
        let certificateCount = 0;

        // 경험 추가 함수
        function addExperience() {
            experienceCount++;
            const container = document.getElementById('experienceContainer');
            const experienceDiv = document.createElement('div');
            experienceDiv.className = 'experience-item';
            experienceDiv.id = `experience-${experienceCount}`;
            
            experienceDiv.innerHTML = `
                <button type="button" class="remove-experience" onclick="removeExperience(${experienceCount})">
                    <i class="fas fa-times"></i>
                </button>
                <div class="experience-header">
                    <div class="experience-number">${experienceCount}</div>
                    <h3>경험 #${experienceCount}</h3>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>경험 이름 (역할/팀)</label>
                        <input type="text" placeholder="대학 축제 홍보팀 팀원 / 전시회 기획">
                    </div>
                    <div class="form-group">
                        <label>기간 (YYYY.MM–YYYY.MM)</label>
                        <input type="text" placeholder="2024.03–2024.06">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>투입시간 (주당)</label>
                        <input type="text" placeholder="주 6시간">
                    </div>
                    <div class="form-group">
                        <label>시작 동기 (왜 시작?)</label>
                        <input type="text" placeholder="교내 교류 확대 기여, 기획 역량 탐색">
                    </div>
                </div>
                <div class="form-group">
                    <label>목표/성과지표</label>
                    <input type="text" placeholder="방문객 수, 참여율, 예산 절감률 등">
                </div>
                <div class="form-group">
                    <label>본인 역할 (본인이 직접 한 일)</label>
                    <textarea placeholder="예산안 작성·스폰서 협의·캘린더 운영"></textarea>
                </div>
                <div class="form-group">
                    <label>문제 상황 (1~2개)</label>
                    <textarea placeholder="초기 홍보 저조, 일정 충돌 등"></textarea>
                </div>
                <div class="form-group">
                    <label>해결 과정 (선택·이유)</label>
                    <textarea placeholder="SNS 채널 확장, 전단 배포 확대, 협의"></textarea>
                </div>
                <div class="form-group">
                    <label>결과 (수치·증거·피드백)</label>
                    <textarea placeholder="관람객 200%↑, 만족도 4.8/5"></textarea>
                </div>
                <div class="form-group">
                    <label>배운 점/다르게 할 점</label>
                    <textarea placeholder="타깃별 채널 전략의 중요성 인식"></textarea>
                </div>
                <div class="form-group">
                    <label>증빙 링크</label>
                    <input type="url" placeholder="사진/게시물/문서/담당자 확인 등">
                </div>
            `;
            
            container.appendChild(experienceDiv);
            updateExperienceCount();
            updateProgress();
        }

        // 경험 제거 함수
        function removeExperience(id) {
            const element = document.getElementById(`experience-${id}`);
            if (element) {
                element.remove();
                renumberExperiences();
                updateExperienceCount();
                updateProgress();
            }
        }

        // 경험 번호 재정렬 함수
        function renumberExperiences() {
            const experiences = document.querySelectorAll('.experience-item');
            experiences.forEach((exp, index) => {
                const newNumber = index + 1;
                // 파란 동그라미 숫자 업데이트
                const numberEl = exp.querySelector('.experience-number');
                if (numberEl) {
                    numberEl.textContent = newNumber;
                }
                // 제목 업데이트
                const titleEl = exp.querySelector('.experience-header h3');
                if (titleEl) {
                    titleEl.textContent = `경험 #${newNumber}`;
                }
            });
        }

        // 경험 개수 업데이트
        function updateExperienceCount() {
            const count = document.querySelectorAll('.experience-item').length;
            document.getElementById('experienceCount').textContent = `${count}개`;
        }

        // 자격증/교육 추가 함수
        function addCertificate() {
            certificateCount++;
            const container = document.getElementById('certificateContainer');
            const certDiv = document.createElement('div');
            certDiv.className = 'form-row';
            certDiv.style.position = 'relative';
            certDiv.innerHTML = `
                <div class="form-group">
                    <label>구분</label>
                    <select>
                        <option value="">선택</option>
                        <option value="교육/수료">교육/수료</option>
                        <option value="자격/면허">자격/면허</option>
                        <option value="수상/공모전">수상/공모전</option>
                        <option value="어학">어학</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>명칭/기관</label>
                    <input type="text" placeholder="자격증명 / 발급기관">
                </div>
                <div class="form-group">
                    <label>기간/취득일</label>
                    <input type="text" placeholder="2024.01">
                </div>
                <div class="form-group">
                    <label>주요 내용·점수</label>
                    <input type="text" placeholder="점수, 등급 등">
                </div>
                <div class="form-group" style="flex:0 0 auto;display:flex;align-items:flex-end;">
                    <button type="button" class="remove-cert" onclick="this.closest('.form-row').remove(); updateProgress();">
                        <i class="fas fa-times"></i> 삭제
                    </button>
                </div>
            `;
            container.appendChild(certDiv);
        }

        // 강점 체크박스 이벤트
        document.addEventListener('change', function(e) {
            if (e.target.type === 'checkbox' && e.target.id.startsWith('strength')) {
                updateStrengthExamples();
            }
        });

        // 강점 사례 업데이트
        function updateStrengthExamples() {
            const checkedStrengths = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
            const container = document.getElementById('strengthExamples');
            
            container.innerHTML = '';
            checkedStrengths.forEach(strength => {
                const div = document.createElement('div');
                div.className = 'example-item';
                div.innerHTML = `
                    <select>
                        <option value="">경험 선택</option>
                        ${getExperienceOptions()}
                    </select>
                    <input type="text" placeholder="${strength} 관련 사례를 한 줄로 작성해주세요" style="flex: 1;">
                `;
                container.appendChild(div);
            });
        }

        // 경험 옵션 생성
        function getExperienceOptions() {
            const experiences = document.querySelectorAll('.experience-item');
            let options = '';
            experiences.forEach((exp, index) => {
                options += `<option value="경험 #${index + 1}">경험 #${index + 1}</option>`;
            });
            return options;
        }

        // 진행률 업데이트
        function updateProgress() {
            const sections = 6; // 총 섹션 수
            let completed = 0;
            
            // 기본정보 체크
            if (document.getElementById('name').value) completed += 0.5;
            if (document.getElementById('email').value) completed += 0.5;
            
            // 지원 목표 체크  
            if (document.getElementById('industry').value) completed += 0.5;
            if (document.getElementById('motivation').value) completed += 0.5;
            
            // 경험 목록 체크
            if (document.querySelectorAll('.experience-item').length > 0) completed += 1;
            
            // 강점 체크
            if (document.querySelectorAll('input[type="checkbox"]:checked').length > 0) completed += 1;
            
            // 자격증 체크
            if (document.querySelectorAll('#certificateContainer .form-row').length > 0) completed += 1;
            
            // 포트폴리오 체크
            if (document.getElementById('linkedin').value || document.getElementById('portfolio').value) completed += 1;
            
            const percentage = (completed / sections) * 100;
            document.getElementById('progressFill').style.width = `${percentage}%`;
        }

        // 데이터 저장

        // HTML로 내보내기
        function exportToHTML() {
            const data = collectAllData();
            const html = generateHTMLReport(data);

            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'self-intro-report.html';
            a.click();
            URL.revokeObjectURL(url);
            showToast('파일 다운로드가 시작되었습니다', 2000);
        }

        // HTML 보고서 생성
        function generateHTMLReport(data) {
            return `<!DOCTYPE html>
<html lang="ko">

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>자기소개서 작성 결과</h1>
            <p>InsideJob Tool-kit으로 작성된 개인 정보 정리</p>
        </div>

        <!-- 기본정보 -->
        <div class="section">

            <div class="info-grid">
                <div class="info-item">

                    <div class="info-value">${data.basicInfo.name}</div>

                <div class="info-item">

                </div>
                <div class="info-item">
                    <div class="info-label">이메일</div>
                    <div class="info-value">${data.basicInfo.email}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">학교/전공/학년</div>
                    <div class="info-value">${data.basicInfo.school}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">거주지역</div>

                    <div class="info-label">희망 취업 시점</div>

        </div>

        <!-- 지원 목표 -->

                <div class="info-item">

                    <div class="info-value">${data.target.industry}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">희망 직무</div>
                    <div class="info-value">${data.target.position}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">희망 근무 형태</div>
                    <div class="info-value">${data.target.workType}</div>

            </div>
            <div class="info-item" style="margin-top: 1rem;">
                <div class="info-label">지원 동기</div>
                <div class="info-value">${data.target.motivation}</div>
            </div>
        </div>

        <!-- 경험 목록 -->
        ${data.experiences.length > 0 ? `
        <div class="section">
            <h2 class="section-title">
                📝 경험 목록
            </h2>
            ${data.experiences.map((exp, index) => `
                <div class="experience-item">
                    <div class="experience-title">경험 ${index + 1}: ${exp.name}</div>
                    <div class="experience-detail"><strong>기간:</strong> ${exp.period}</div>
                    <div class="experience-detail"><strong>투입시간:</strong> ${exp.timeInvest}</div>
                    <div class="experience-detail"><strong>시작동기:</strong> ${exp.motivation}</div>
                    <div class="experience-detail"><strong>목표/성과:</strong> ${exp.goal}</div>
                    <div class="experience-detail"><strong>본인역할:</strong> ${exp.role}</div>
                    <div class="experience-detail"><strong>문제상황:</strong> ${exp.problem}</div>
                    <div class="experience-detail"><strong>해결과정:</strong> ${exp.solution}</div>
                    <div class="experience-detail"><strong>결과:</strong> ${exp.result}</div>
                    <div class="experience-detail"><strong>배운점:</strong> ${exp.learned}</div>
                    ${exp.link ? `<div class="experience-detail"><strong>증빙링크:</strong> <a href="${exp.link}" target="_blank">${exp.link}</a></div>` : ''}
                </div>
            `).join('')}
        </div>
        ` : ''}

        <!-- 강점 -->
        ${data.strengths.length > 0 ? `
        <div class="section">
            <h2 class="section-title">
                ⭐ 선택한 강점
            </h2>
            <div class="strength-list">
                ${data.strengths.map(strength => `<span class="strength-tag">${strength}</span>`).join('')}
            </div>
        </div>
        ` : ''}

        <!-- 포트폴리오 -->
        <div class="section">
            <h2 class="section-title">
                🔗 포트폴리오 & 링크
            </h2>
            ${data.portfolio.linkedin ? `<div class="link-item">🔹 <strong>링크드인:</strong> <a href="${data.portfolio.linkedin}" target="_blank">${data.portfolio.linkedin}</a></div>` : ''}
            ${data.portfolio.portfolio ? `<div class="link-item">🔹 <strong>포트폴리오:</strong> <a href="${data.portfolio.portfolio}" target="_blank">${data.portfolio.portfolio}</a></div>` : ''}
            ${data.portfolio.blog ? `<div class="link-item">🔹 <strong>블로그:</strong> <a href="${data.portfolio.blog}" target="_blank">${data.portfolio.blog}</a></div>` : ''}
            ${data.portfolio.presentation ? `<div class="link-item">🔹 <strong>발표자료:</strong> <a href="${data.portfolio.presentation}" target="_blank">${data.portfolio.presentation}</a></div>` : ''}
            ${data.portfolio.others ? `<div class="link-item">🔹 <strong>기타:</strong> <a href="${data.portfolio.others}" target="_blank">${data.portfolio.others}</a></div>` : ''}
        </div>

        <div class="footer">
            <p class="company-name">© 2025 OpenConnect Co., Ltd. All rights reserved.</p>

            <p class="rights">모든 서비스 및 콘텐츠의 권리는 (주)오픈커넥트에 귀속됩니다.</p>
            <p style="margin-top: 0.5rem; font-size: 0.8rem;">📅 작성일: ${new Date().toLocaleDateString('ko-KR')} | 🛠️ 자기소개서 Tool-kit</p>
        </div>
    </div>
</body>
</html>`;
        }

        // 모든 데이터 수집
        function collectAllData() {
            return {
                basicInfo: {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    school: document.getElementById('school').value,
                    location: document.getElementById('location').value,
                    hopedDate: document.getElementById('hopedDate').value
                },
                target: {
                    industry: document.getElementById('industry').value,
                    position: document.getElementById('position').value,
                    motivation: document.getElementById('motivation').value,
                    workType: document.getElementById('workType').value
                },
                experiences: Array.from(document.querySelectorAll('.experience-item')).map(exp => {
                    const inputs = exp.querySelectorAll('input, textarea');
                    return {
                        name: inputs[0].value,
                        period: inputs[1].value,
                        timeInvest: inputs[2].value,
                        motivation: inputs[3].value,
                        goal: inputs[4].value,
                        role: inputs[5].value,
                        problem: inputs[6].value,
                        solution: inputs[7].value,
                        result: inputs[8].value,
                        learned: inputs[9].value,
                        link: inputs[10].value
                    };
                }),
                strengths: Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value),
                portfolio: {
                    linkedin: document.getElementById('linkedin').value,
                    portfolio: document.getElementById('portfolio').value,
                    blog: document.getElementById('blog').value,
                    presentation: document.getElementById('presentation').value,
                    others: document.getElementById('others').value
                }
            };
        }

        // 토스트 알림
        function showToast(message, duration) {
            duration = duration || 2500;
            var existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.textContent = message;
            document.body.appendChild(toast);
            requestAnimationFrame(function() { toast.classList.add('show'); });
            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() { toast.remove(); }, 400);
            }, duration);
        }

        // 글자 수 카운터
        function updateCharCount(el, max) {
            var counter = el.parentElement.querySelector('.char-counter');
            if (!counter) return;
            var len = el.value.length;
            counter.textContent = len + ' / ' + max + '자';
            counter.className = 'char-counter';
            if (len >= max) counter.classList.add('at-limit');
            else if (len >= max * 0.8) counter.classList.add('near-limit');
        }

        // Autosave to localStorage
        var autosaveTimer = null;
        var hasUnsavedChanges = false;

        function autoSave() {
            try {
                var data = collectAllData();
                localStorage.setItem('insidejob_toolkit_autosave', JSON.stringify(data));
                hasUnsavedChanges = false;
                // 저장 표시
                var indicator = document.getElementById('autosave-indicator');
                if (indicator) {
                    indicator.classList.add('show');
                    setTimeout(function() { indicator.classList.remove('show'); }, 1500);
                }
            } catch(e) {}
        }

        function scheduleAutosave() {
            hasUnsavedChanges = true;
            if (autosaveTimer) clearTimeout(autosaveTimer);
            autosaveTimer = setTimeout(autoSave, 3000);
        }

        function loadAutosave() {
            try {
                var saved = localStorage.getItem('insidejob_toolkit_autosave');
                if (!saved) return;
                var data = JSON.parse(saved);
                if (!data || !data.basicInfo) return;

                // 기본정보 복원
                if (data.basicInfo.name) document.getElementById('name').value = data.basicInfo.name;
                if (data.basicInfo.phone) document.getElementById('phone').value = data.basicInfo.phone;
                if (data.basicInfo.email) document.getElementById('email').value = data.basicInfo.email;
                if (data.basicInfo.school) document.getElementById('school').value = data.basicInfo.school;
                if (data.basicInfo.location) document.getElementById('location').value = data.basicInfo.location;
                if (data.basicInfo.hopedDate) document.getElementById('hopedDate').value = data.basicInfo.hopedDate;

                // 지원 목표 복원
                if (data.target) {
                    if (data.target.industry) document.getElementById('industry').value = data.target.industry;
                    if (data.target.position) document.getElementById('position').value = data.target.position;
                    if (data.target.motivation) {
                        document.getElementById('motivation').value = data.target.motivation;
                        updateCharCount(document.getElementById('motivation'), 200);
                    }
                    if (data.target.workType) document.getElementById('workType').value = data.target.workType;
                }

                // 포트폴리오 복원
                if (data.portfolio) {
                    if (data.portfolio.linkedin) document.getElementById('linkedin').value = data.portfolio.linkedin;
                    if (data.portfolio.portfolio) document.getElementById('portfolio').value = data.portfolio.portfolio;
                    if (data.portfolio.blog) document.getElementById('blog').value = data.portfolio.blog;
                    if (data.portfolio.presentation) document.getElementById('presentation').value = data.portfolio.presentation;
                    if (data.portfolio.others) document.getElementById('others').value = data.portfolio.others;
                }

                showToast('이전 작성 내용을 불러왔습니다', 2000);
            } catch(e) {}
        }

        // 페이지 이탈 경고
        window.addEventListener('beforeunload', function(e) {
            if (hasUnsavedChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // 페이지 로드 시 이벤트 리스너 추가
        document.addEventListener('DOMContentLoaded', function() {
            // 입력 필드 변경 시 진행률 업데이트 + autosave 스케줄
            document.addEventListener('input', function() { updateProgress(); scheduleAutosave(); });
            document.addEventListener('change', function() { updateProgress(); scheduleAutosave(); });

            // 초기 경험 하나 추가
            addExperience();

            // 자동저장 데이터 복원
            loadAutosave();

            // 진행률 초기화
            updateProgress();
        });

        // 히스토리 네비게이션 - 뒤로가기 시 부모 페이지로
        (function() {
            // 초기 히스토리 상태 설정
            history.replaceState({ page: 'toolkit' }, '', location.href);

            // 뒤로가기 이벤트 처리
            window.addEventListener('popstate', function(event) {
                // 부모 페이지(index.html)로 메시지 전송
                if (window.parent !== window) {
                    window.parent.postMessage({ action: 'backToServices' }, '*');
                }
            });
        })();
    </script>

    <div class="autosave-indicator" id="autosave-indicator">저장됨</div>

    <!-- 푸터 추가 -->
    <div class="footer">
