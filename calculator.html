<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 커스텀 토스트 함수 (alert 대체)
        function showToast(message, duration = 2500) {
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.textContent = message;
            document.body.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.add('show'); });
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, duration);
        }

        // 취업경쟁력 계산기 - 3단계 객관식 평가 시스템
        const CareerCompetitivenessCalculator = ({ savedCalculations = [], onCalculationComplete, setCurrentView, currentUser, showNotification, setAuthMode, setShowSaveResultSignupModal }) => {
            const [calculatorStep, setCalculatorStep] = useState(1);

            // 히스토리 관리 - 단계 변경 시 히스토리 추가
            useEffect(() => {
                if (calculatorStep === 1) {
                    // 첫 단계는 replace로 (중복 방지)
                    history.replaceState({ step: 1 }, '', location.href);
                } else {
                    // 이후 단계는 push로
                    history.pushState({ step: calculatorStep }, '', `#step${calculatorStep}`);
                }
            }, [calculatorStep]);

            // 뒤로가기 이벤트 처리
            useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state && event.state.step) {
                        // 히스토리에서 단계 정보가 있으면 해당 단계로 이동
                        setCalculatorStep(event.state.step);
                    } else {
                        // 히스토리가 없으면 부모 페이지(서비스 선택)로 이동
                        if (window.parent !== window) {
                            window.parent.postMessage({ action: 'backToServices' }, '*');
                        }
                    }
                };

                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            // 진단 결과 자동 반영용 알림
            const [diagnosisNotice, setDiagnosisNotice] = useState(null);

            // 진단 결과에서 추천 직무 자동 반영 (setTimeout으로 authorizedJobDatabase 정의 후 실행)
            const diagnosisAutoApplied = useRef(false);
            useEffect(() => {
                if (diagnosisAutoApplied.current) return;
                const timer = setTimeout(() => {
                    try {
                        const diagRaw = localStorage.getItem('insidejob_diagnosis_result');
                        if (!diagRaw) return;
                        const diagData = JSON.parse(diagRaw);
                        if (!diagData || !diagData.topJobs || diagData.topJobs.length === 0) return;

                        const topJob = diagData.topJobs[0];
                        if (!topJob || !topJob.jobId) return;
                        const jobId = topJob.jobId;
                        const jobTitle = topJob.title || jobId;

                        if (typeof authorizedJobDatabase === 'undefined') return;
                        const allJobs = Object.values(authorizedJobDatabase)
                            .filter(v => Array.isArray(v))
                            .flat();

                        diagnosisAutoApplied.current = true;
                        if (allJobs.includes(jobId)) {
                            setFormData(prev => ({ ...prev, targetJob: jobId }));
                            setDiagnosisNotice('진단 결과에서 추천된 \'' + jobTitle + '\'이(가) 자동 선택되었습니다');
                        } else {
                            setFormData(prev => ({ ...prev, targetJob: 'custom', customJob: jobTitle }));
                            setDiagnosisNotice('진단 결과에서 추천된 \'' + jobTitle + '\'이(가) 자동 입력되었습니다');
                        }
                    } catch(e) {
                        console.warn('진단 결과 자동 반영 실패:', e);
                    }
                }, 0);
                return () => clearTimeout(timer);
            }, []);

            const [formData, setFormData] = useState({
                // 1단계: 기본정보 및 배경 (35점)
                gender: '',
                age: '',
                educationLevel: '',
                majorField: '',
                targetJob: '',
                customJob: '',
                languageLevel: '',
                // 2단계: 전공별 맞춤 역량평가 (40점)
                // 이공계 전용
                programmingSkills: [],
                techProjectExperience: [],
                techCertifications: [],
                // 문과 전용
                officeSkills: [],
                planningExperience: [],
                businessCertifications: [],
                customBusinessCert: '',
                // 마케팅/영업 전용
                marketingTools: [],
                marketingExperience: [],
                marketingCertifications: [],
                // 경영지원/관리 전용
                businessTools: [],
                businessExperience: [],
                // 디자인 전용
                designTools: [],
                designExperience: [],
                designCertifications: [],
                // 전문직/산업별 전용
                specializedTools: [],
                specializedExperience: [],
                specializedCertifications: [],
                // "해당사항 없음" 체크박스들 - 각 소질문 카테고리별
                // 기술/개발 직무
                noTechSkills: false,
                noTechExperience: false,
                noTechCertifications: false,
                // 기획/전략 직무
                noPlanningSkills: false,
                noPlanningExperience: false,
                noBusinessCertifications: false,
                // 마케팅/영업 직무
                noMarketingSkills: false,
                noMarketingExperience: false,
                noMarketingCertifications: false,
                // 경영지원 직무
                noBusinessSkills: false,
                noBusinessExperience: false,
                // 디자인 직무
                noDesignSkills: false,
                noDesignExperience: false,
                noDesignCertifications: false,
                // 전문직 직무
                noSpecializedSkills: false,
                noSpecializedExperience: false,
                noSpecializedCertifications: false,
                // 범용 질문
                noGeneralSkills: false,
                noGeneralExperience: false,
                noGeneralCertifications: false,
                // Pool에 없는 직무용 범용 질문
                generalTools: [],           // 업무 도구/소프트웨어 (10점)
                generalExperience: [],      // 관련 경험 (15점)  
                generalCertifications: [],  // 자격증/수료증 (15점)
                customGeneralCert: '',      // 기타 자격증 직접 입력
                // 3단계: 시장수용도 + 지원전략 (30점)
                jobPreparation: [],
                applicationStrategy: []
            });
            const [calculatorResult, setCalculatorResult] = useState(null);
            const [isResultSaved, setIsResultSaved] = useState(false);

            // 배열 타입 필드 처리 함수
            const handleArrayChange = (field, value, isChecked) => {
                const currentArray = formData[field] || [];
                let newArray;
                
                if (isChecked) {
                    newArray = [...currentArray, value];
                } else {
                    newArray = currentArray.filter(item => item !== value);
                }
                
                setFormData({ ...formData, [field]: newArray });
            };

            // 체크박스 토글 함수 (누락된 함수 추가)
            const handleArrayToggle = (field, value) => {
                const currentArray = formData[field] || [];
                const isCurrentlyChecked = currentArray.includes(value);
                
                // 일반 항목 체크시 해당하는 "해당사항 없음" 플래그 자동 해제
                if (!isCurrentlyChecked) { // 체크하려는 경우
                    const updates = { ...formData };
                    if (field === 'generalSkills') updates.noGeneralSkills = false;
                    else if (field === 'generalExperience') updates.noGeneralExperience = false;
                    else if (field === 'generalCertifications') updates.noGeneralCertifications = false;
                    else if (field === 'programmingSkills') updates.noTechSkills = false;
                    else if (field === 'techProjectExperience') updates.noTechExperience = false;
                    else if (field === 'techCertifications') updates.noTechCertifications = false;
                    else if (field === 'officeSkills') updates.noPlanningSkills = false;
                    else if (field === 'planningExperience') updates.noPlanningExperience = false;
                    else if (field === 'businessCertifications') updates.noBusinessCertifications = false;
                    else if (field === 'marketingTools') updates.noMarketingSkills = false;
                    else if (field === 'marketingExperience') updates.noMarketingExperience = false;
                    else if (field === 'marketingCertifications') updates.noMarketingCertifications = false;
                    else if (field === 'designTools') updates.noDesignSkills = false;
                    else if (field === 'designExperience') updates.noDesignExperience = false;
                    else if (field === 'designCertifications') updates.noDesignCertifications = false;
                    else if (field === 'businessTools') updates.noBusinessSkills = false;
                    else if (field === 'businessExperience') updates.noBusinessExperience = false;
                    else if (field === 'specializedTools') updates.noSpecializedSkills = false;
                    else if (field === 'specializedExperience') updates.noSpecializedExperience = false;
                    else if (field === 'specializedCertifications') updates.noSpecializedCertifications = false;
                    
                    // 배열 업데이트
                    const newArray = [...currentArray, value];
                    updates[field] = newArray;
                    setFormData(updates);
                } else {
                    // 체크 해제하는 경우
                    const newArray = currentArray.filter(item => item !== value);
                    setFormData({ ...formData, [field]: newArray });
                }
            };

            // 인기 직무 데이터 자동 업데이트 함수 (향후 구현용)
            const updatePopularJobs = async () => {
                try {
                    // 워크넷 오픈API 또는 외부 JSON 파일에서 최신 데이터 가져오기
                    
                    // 실제 구현 시 API 호출 로직 추가
                    // const response = await fetch(popularJobsConfig.updateUrl);
                    // const newData = await response.json();
                    // popularJobsConfig.jobs = newData.jobs;
                    // popularJobsConfig.lastUpdated = new Date().toISOString().split('T')[0];
                    
                } catch (error) {
                    console.error('인기 직무 데이터 업데이트 실패:', error);
                }
            };

            // 일반 필드 처리 함수
            const handleInputChange = (field, value) => {
                setFormData(prevData => {
                    const newData = { ...prevData, [field]: value };
                    return newData;
                });
            };

            // 다음 단계로 이동
            const goToNextStep = (step) => {
                setCalculatorStep(step);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // 단계별 유효성 검사
            const validateStep = (step) => {
                switch(step) {
                    case 1:
                        // targetJob이 있거나 customJob이 있으면 OK
                        const hasValidJob = formData.targetJob && 
                                          (formData.targetJob !== 'custom' || (formData.targetJob === 'custom' && formData.customJob && formData.customJob.trim()));
                        
                            gender: formData.gender,
                            age: formData.age,
                            educationLevel: formData.educationLevel,
                            majorField: formData.majorField,
                            targetJob: formData.targetJob,
                            customJob: formData.customJob,
                            languageLevel: formData.languageLevel,
                            hasValidJob: hasValidJob
                        });
                        
                        return formData.gender && formData.age && formData.educationLevel && formData.majorField && hasValidJob && formData.languageLevel;
                    case 2:
                        // Pool에 없는 직무 체크
                        const selectedJob = getSelectedJob();
                        const isOutOfPool = isOutOfPoolJob(selectedJob);
                        
                        if (isOutOfPool) {
                            // Pool에 없는 직무는 범용 질문 필수 (해당사항 없음 허용)
                            return (formData.generalTools && formData.generalTools.length > 0) || formData.noGeneralSkills;
                        } else {
                            // 직무별 필수 항목 검사 (해당사항 없음 허용)
                            const jobGroup = getJobGroup(selectedJob);
                            switch(jobGroup) {
                                case 'tech_development':
                                    return (formData.programmingSkills && formData.programmingSkills.length > 0) || formData.noTechSkills;
                                case 'planning_strategy':
                                    return (formData.officeSkills && formData.officeSkills.length > 0) || formData.noPlanningSkills;
                                case 'marketing_sales':
                                    return (formData.marketingTools && formData.marketingTools.length > 0) || formData.noMarketingSkills;
                                case 'business_support':
                                    return (formData.businessTools && formData.businessTools.length > 0) || formData.noBusinessSkills;
                                case 'design':
                                    return (formData.designTools && formData.designTools.length > 0) || formData.noDesignSkills;
                                case 'specialized_professional':
                                    return (formData.specializedTools && formData.specializedTools.length > 0) || formData.noSpecializedSkills;
                                default:
                                    return true; // 기본값
                            }
                        }
                        return true;
                    case 3:
                        return (formData.jobPreparation && formData.jobPreparation.length > 0) || 
                               (formData.applicationStrategy && formData.applicationStrategy.length > 0);
                    default:
                        return true;
                }
            };

            // 필수 입력 필드 스타일 클래스
            const getFieldStyle = (fieldValue, isRequired = true) => {
                if (!isRequired) return "";
                return !fieldValue ? "border-red-300 bg-red-50" : "border-gray-300";
            };

            // 점수를 성장단계로 변환 (100점 만점 기준) - 정원 성장 메타포
            const getGradeFromScore = (score) => {
                if (score >= 90) return { grade: '🌳 전문가 단계', level: 'EXPERT', color: 'text-green-700', bg: 'bg-green-50', description: '상위 5% - 열매가 풍성한 나무처럼 완성된 전문가', icon: '🌳' };
                if (score >= 78) return { grade: '🌿 숙련자 단계', level: 'ADVANCED', color: 'text-green-600', bg: 'bg-green-50', description: '상위 15% - 튼튼하게 자란 나무처럼 우수한 경쟁력', icon: '🌿' };
                if (score >= 66) return { grade: '🌱 성장중 단계', level: 'GROWING', color: 'text-lime-600', bg: 'bg-lime-50', description: '상위 40% - 새싹이 자라듯 꾸준히 발전하는 중', icon: '🌱' };
                if (score >= 54) return { grade: '🌾 준비중 단계', level: 'PREPARING', color: 'text-yellow-600', bg: 'bg-yellow-50', description: '평균 수준 - 씨앗이 발아하듯 기반을 다지는 중', icon: '🌾' };
                if (score >= 42) return { grade: '🌰 기초 단계', level: 'BEGINNER', color: 'text-orange-600', bg: 'bg-orange-50', description: '견과류처럼 단단한 기초를 쌓아가는 중', icon: '🌰' };

                            {/* 취업준비 컨설팅 */}
                            {calculatorResult.serviceRecommendations && calculatorResult.serviceRecommendations.length > 0 && (
                                <div>
                                    <div className="flex items-center mb-4">
                                        <div className="bg-purple-500 text-white rounded-full p-2 mr-3">
                                            <span className="text-base">🎯</span>
                                        </div>
                                        <h4 className="text-xl font-bold text-purple-800">전문가에게 도움받기</h4>
                                    </div>
                                    <div className="grid gap-3">
                                        {calculatorResult.serviceRecommendations.map((rec, index) => (
                                            <div key={index} className="border-l-4 border-purple-500 bg-white p-4 rounded-r-lg shadow-sm hover:shadow-md transition-shadow">
                                                <div className="flex items-start">
                                                    <span className="bg-purple-100 text-purple-800 rounded-full w-6 h-6 flex items-center justify-center text-sm font-bold mr-3 mt-0.5 flex-shrink-0">
                                                        {index + 1}
                                                    </span>
                                                    <div>
                                                        <h5 className="font-bold text-gray-900 mb-1">{rec.title}</h5>
                                                        <p className="text-gray-700 leading-relaxed text-sm">{rec.content}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            
                            {/* 컨설팅 유도 메시지 */}
                            <div className="mt-6 p-4 bg-gradient-to-r from-orange-50 to-red-50 border border-orange-200 rounded-lg">
                                <p className="text-sm text-orange-800 text-center">
                                    <span className="font-semibold">💼 전문가 컨설팅으로 취업 성공률 UP!</span><br/>
                                    위 영역에서 전문가의 도움을 받으면 취업 확률이 크게 높아집니다. 전문 컨설팅 서비스를 준비 중입니다.
                                </p>
                            </div>
                        </div>

                        {/* 주요 액션 버튼 */}
                        <div className="flex flex-col sm:flex-row gap-3 justify-center">
                            <button
                                className="btn-primary px-6 py-3"
                                onClick={downloadResultAsHTML}
                            >
                                📥 결과 저장하기
                            </button>
                            <button
                                className="btn-primary px-6 py-3"
                                onClick={shareCompetitivenessCard}
                            >
                                📸 경쟁력 카드 공유
                            </button>
                        </div>

                        {/* 보조 액션 버튼 */}
                        <div className="flex flex-col sm:flex-row gap-2 justify-center mt-3">
                            <button
                                className="px-5 py-2.5 rounded-lg text-sm font-medium border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors"
                                onClick={() => {
                                    setCalculatorStep(3);
                                    window.scrollTo({ top: 0, behavior: 'smooth' });
                                }}
                            >
                                ← 수정하기
                            </button>
                            <button
                                className="px-5 py-2.5 rounded-lg text-sm font-medium border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors"
                                onClick={() => {
                                    setCalculatorStep(1);
                                    setFormData({
                                        age: '',
                                        educationLevel: '',
                                        languageLevel: '',
                                        certifications: [],
                                        technicalSkills: [],
                                        practicalExperience: [],
                                        jobDemand: '',
                                        applicationStrategy: [],
                                        preparationLevel: []
                                    });
                                    setCalculatorResult(null);
                                    setIsResultSaved(false);
                                    window.scrollTo({ top: 0, behavior: 'smooth' });
                                }}
                            >
                                🔄 다시 진단
                            </button>
                        </div>

                        {/* 추가 안내 */}
                        <div className="mt-8 p-4 bg-gray-50 rounded-lg">
                            <p className="text-sm text-gray-600 text-center">
                                💡 이 계산 결과는 참고용이며, 실제 취업 성과는 다양한 요인에 따라 달라질 수 있습니다.<br/>
                                더 정확한 조언을 원하시면 현직자 상담을 받아보세요!
                            </p>
                        </div>
                    </div>
                );
            }

            return null;
        };

        // 메인 앱 컴포넌트
        const App = () => {
            return (
                <div className="min-h-screen">
                    <header className="bg-white shadow-sm border-b mb-8">
                        <div className="max-w-4xl mx-auto px-6 py-4 text-center">
                            <img src="logo.png" alt="인사이드잡" style={{ width: '60px', height: '60px', margin: '0 auto 1rem auto', display: 'block' }} />
                            <h1 className="text-2xl font-bold text-gray-900">취업경쟁력 계산기</h1>
                        </div>
                    </header>
                    
                    <main>
                        <CareerCompetitivenessCalculator 
                            savedCalculations={[]} 
                            onCalculationComplete={() => {}} 
                            setCurrentView={() => {}} 
                            currentUser={null} 
                            showNotification={(message, type) => showToast(message)} 
                            setAuthMode={() => {}} 
                            setShowSaveResultSignupModal={() => {}} 
                        />
                    </main>
                    
                    <footer className="bg-white border-t mt-16">
                        <div className="max-w-4xl mx-auto px-6 py-8 text-center text-gray-500">
                            <p>&copy; 2025 OpenConnect Co., Ltd. All rights reserved.</p>
                            <p className="text-sm mt-2">Powered by (주)오픈커넥트</p>
                            <p className="text-xs mt-1">모든 서비스 및 콘텐츠의 권리는 (주)오픈커넥트에 귀속됩니다.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        // React 18 호환 - createRoot 사용
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
